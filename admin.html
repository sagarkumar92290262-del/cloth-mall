 <!DOCTYPE html><html>
<head>
<title>Admin Panel</title>
<link rel="stylesheet" href="style.css">
</head>
<body><h1 style="text-align:center;">🛠 Admin Panel</h1><div class="product-box"><h2>Add Product</h2><input type="text" id="name" placeholder="Product Name"><input type="number" id="price" placeholder="Price"><input type="file" id="image" accept="image/*">
<select id="category">
<option value="mens">Mens</option>
<option value="womens">Womens</option>
<option value="bridal">Bridal</option>
<option value="kids">Kids</option>
</select>

<button onclick="addProduct()">
Add Product
</button></div><div id="admin-products"></div><script>

showProducts();

function addProduct(){
alert("Button Working");
let name = document.getElementById("name").value;
let price = document.getElementById("price").value;
let file = document.getElementById("image").files[0];
let category = document.getElementById("category").value;

if(name === "" || price === ""){
alert("Please fill all fields");
return;
}

if(!file){
alert("Please select an image");
return;
}

let reader = new FileReader();

reader.onload = function(e){

let products =
JSON.parse(localStorage.getItem("products")) || [];

products.push({
name:name,
price:price,
image:e.target.result,
category:category
});

localStorage.setItem(
"products",
JSON.stringify(products)
);

alert("Product Added Successfully ✅");

location.reload();

};

reader.readAsDataURL(file);

}

function showProducts(){

let products =
JSON.parse(localStorage.getItem("products")) || [];

let box =
document.getElementById("admin-products");

box.innerHTML = "";

products.forEach((p,index)=>{

box.innerHTML += `
<div class="product-box">

<img src="${p.image}" width="120">

<h3>${p.name}</h3>

<p>₹${p.price}</p>

<button onclick="deleteProduct(${index})">
Delete
</button>

</div>
`;

});

}

function deleteProduct(index){

let products =
JSON.parse(localStorage.getItem("products")) || [];

products.splice(index,1);

localStorage.setItem(
"products",
JSON.stringify(products)
);
location.reload();
}
</script>
</body>
</html>
